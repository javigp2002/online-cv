career-profile:
  title: Career Profile
  summary: |
    My experience encompasses the full Android development lifecycle, from
    requirement gathering to implementing robust mobile applications using
    Kotlin and Jetpack Compose.

    I follow Clean Architecture and software design patterns to build
    scalable, maintainable codebases. I also integrate complex technologies,
    including hardware sensors, IoT devices, and computer vision models,
    translating technical constraints into functional, high-performance
    mobile solutions.

experiences:
  title: Experience
  info:
  - role: Full Stack Engineer 
    time: 06.2025 - 10.2025
    company: University of Granada, Granada, Spain
    details: |
      Flutter - NestJS - Docker - Firebase - Android
        
        Developed and maintained a full-stack product using Flutter (mobile)
        and NestJS (backend) for BIORI.
          - Followed clean architecture principles.
          - Served more than 300 active users across Android and iOS platforms.
          - Implemented push notifications using Firebase Cloud Messaging (FCM).
          - Built native Android-specific handling within the app.

  - role: Backend Engineer 
    time: 02.2025 - 06.2025
    company: AGR Gestion y Asesoramiento 2030 SL, Granada, Spain
    details: |
      Azure - MySQL - NestJS 

        Developed a backend application that aggregated and normalized data
        from multiple APIs into a unified finance database.
          - Collected and analyzed client requirements to draft a scalable
            project for Power BI.
          - Deployed the solution on Microsoft Azure services.

  - role: Full Stack Engineer
    time: 03.2024 - 10.2024
    company: University of Granada, Granada, Spain
    details: |
      Flutter - NestJS - RxDart - Scrum - JWT - Git
        
        Designed and implemented a full-stack product using Flutter (mobile)
        and NestJS (backend) for BIORI.
          - Applied MVVM pattern and reactive programming with RxDart.
          - Secured backend services using JWT authentication.
          - Implemented unit and integration tests with Jest and Supertest.
          - Managed logs and refined requirements with the client.
          - Designed and iterated UX/UI prototypes based on feedback.

